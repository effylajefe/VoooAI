<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Canvas — VoooAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <style>
    :root {
      --bg-deep: #060611;
      --bg-surface: #10101b;
      --bg-canvas: #050511;
      --accent-cyan: #00d4aa;
      --accent-magenta: #e040fb;
      --text-primary: #f5f5fb;
      --text-muted: #8b8ba3;
      --border-subtle: rgba(255,255,255,0.06);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body.is-linking {
      cursor: crosshair;
    }
    body.is-linking .canvas-nodes {
      cursor: crosshair;
    }
    body {
      min-height: 100vh;
      background-color: #000;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      font-family: 'Outfit', sans-serif;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
    }
    .logo:hover {
      opacity: 0.9;
    }
    .logo-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    .logo-icon svg {
      width: 100%;
      height: 100%;
    }
    .logo-text {
      font-weight: 600;
      letter-spacing: -0.02em;
      font-size: 1.1rem;
    }
    .header-crumbs {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-actions .profile-wrap,
    .header-actions .settings-wrap {
      position: relative;
    }
    .header-actions .profile-menu,
    .header-actions .settings-menu {
      right: 0;
      left: auto;
    }
    .profile-menu .add-dropdown-section:first-of-type {
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 0.2rem;
      padding-top: 0.2rem;
    }
    .header-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .header-btn:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
    }
    .header-btn svg {
      width: 20px;
      height: 20px;
    }
    .header-btn.profile {
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      color: #020208;
      border: none;
    }
    .header-btn.profile:hover {
      filter: brightness(1.08);
    }
    .header-btn.text {
      width: auto;
      padding: 0 1rem;
      font-size: 0.9rem;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.75rem 1.5rem 1.5rem;
      gap: 0.75rem;
    }
    .prompt-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      z-index: 10;
      background: var(--bg-surface);
      border-radius: 14px;
      border: 1px solid var(--border-subtle);
      padding: 0.6rem 0.7rem 0.6rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #workflow-prompt {
      flex: 1;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      background: #05050d;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      padding: 0.6rem 0.7rem;
    }
    #workflow-prompt::placeholder {
      color: var(--text-muted);
    }
    #workflow-prompt:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px rgba(0,212,170,0.3);
    }
    .prompt-send {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #020208;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,0.7);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }
    .prompt-send:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 14px 32px rgba(0,0,0,0.8);
    }
    .prompt-send span {
      font-size: 1rem;
      line-height: 1;
    }
    .prompt-sparkle {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .prompt-sparkle:hover {
      color: var(--accent-cyan);
      border-color: rgba(0,212,170,0.4);
      background: rgba(0,212,170,0.08);
    }
    .prompt-sparkle.prompt-random {
      background: rgba(0, 212, 170, 0.15);
      border-color: rgba(0, 212, 170, 0.3);
      color: var(--accent-cyan);
    }
    .prompt-sparkle.prompt-random:hover {
      background: rgba(0, 212, 170, 0.25);
      box-shadow: 0 0 16px rgba(0, 212, 170, 0.25);
    }
    .prompt-sparkle svg {
      width: 20px;
      height: 20px;
    }
    .canvas-shell {
      flex: 1;
      background: var(--bg-surface);
      border-radius: 18px;
      border: 1px solid var(--border-subtle);
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    .canvas-inner {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      border: none;
      background-color: #000;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .workflow-tab-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 0.5rem;
      height: 34px;
      overflow-x: auto;
      scrollbar-width: none;
      z-index: 3;
    }
    .workflow-tab-bar::-webkit-scrollbar { display: none; }
    .workflow-tab {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      height: 100%;
      padding: 0 0.75rem 0 0.85rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      border: none;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      border-right: 1px solid var(--border-subtle);
      transition: color 0.15s, background 0.15s;
      max-width: 180px;
    }
    .workflow-tab:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.04);
    }
    .workflow-tab.is-active {
      color: var(--text-primary);
      background: var(--bg-surface);
      border-bottom: 2px solid var(--accent-cyan);
    }
    .workflow-tab-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
      text-align: left;
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      padding: 0;
      cursor: pointer;
      outline: none;
    }
    .workflow-tab-name:focus {
      outline: 1px solid rgba(0,212,170,0.5);
      border-radius: 3px;
    }
    .workflow-tab-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }
    .workflow-tab-close:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }
    .workflow-tab-close svg { width: 10px; height: 10px; }
    .workflow-tab-add {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      margin-left: 2px;
      transition: background 0.15s, color 0.15s;
    }
    .workflow-tab-add:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }
    .workflow-tab-add svg { width: 14px; height: 14px; }
    .canvas-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0.35rem 0.6rem;
      z-index: 2;
    }
    .toolbar-button {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      padding: 0.28rem 0.35rem;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
      font-size: 0.8rem;
    }
    .toolbar-button:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.06);
    }
    .toolbar-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .toolbar-button svg {
      width: 14px;
      height: 14px;
    }
    .toolbar-button.primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      color: #020208;
      padding: 0.28rem 0.55rem;
      margin-left: 0.1rem;
    }
    .toolbar-button.primary:hover {
      filter: brightness(1.05);
    }
    .toolbar-button.primary svg {
      width: 12px;
      height: 12px;
      margin-right: 0.2rem;
    }
    .toolbar-button-text {
      padding: 0.28rem 0.5rem;
      gap: 0.25rem;
    }
    .add-split {
      display: inline-flex;
      align-items: stretch;
      border-radius: 6px;
      overflow: hidden;
      margin-left: 0.1rem;
    }
    .add-split-main {
      border: none;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      color: #020208;
      padding: 0.28rem 0.35rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.15s ease;
    }
    .add-split-main:hover {
      filter: brightness(1.05);
    }
    .add-split-main svg {
      width: 14px;
      height: 14px;
    }
    .add-split-dropdown {
      border: none;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      color: #020208;
      padding: 0.28rem 0.2rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid rgba(0,0,0,0.2);
      transition: filter 0.15s ease;
    }
    .add-split-dropdown:hover {
      filter: brightness(1.05);
    }
    .add-split-dropdown svg {
      width: 10px;
      height: 10px;
    }
    .toolbar-add-group {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .toolbar-category-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.55rem;
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .toolbar-category-btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
    }
    .toolbar-category-btn svg {
      width: 13px;
      height: 13px;
      color: var(--text-muted);
    }
    .toolbar-category-btn .chevron {
      width: 10px;
      height: 10px;
      margin-left: 0.1rem;
      opacity: 0.6;
    }
    .add-dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 3px;
      min-width: 170px;
      background: rgba(16,16,27,0.98);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
      padding: 0.25rem 0;
      z-index: 100;
      display: none;
    }
    .add-dropdown-menu.is-open {
      display: block;
    }
    .add-dropdown-section {
      padding: 0.2rem 0;
    }
    .add-dropdown-section:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .add-dropdown-label {
      padding: 0.25rem 0.6rem 0.15rem;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .add-dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.35rem 0.6rem;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .add-dropdown-item:hover {
      background: rgba(255,255,255,0.06);
    }
    .add-dropdown-item svg {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .add-dropdown-item.has-submenu {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .add-dropdown-item.has-submenu .submenu-caret {
      width: 10px;
      height: 10px;
      color: var(--text-muted);
      opacity: 0.7;
      flex-shrink: 0;
    }
    .add-dropdown-submenu {
      position: absolute;
      top: 0;
      left: 100%;
      margin-left: 2px;
      min-width: 155px;
      background: rgba(16,16,27,0.98);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
      padding: 0.25rem 0;
      z-index: 101;
      display: none;
    }
    .add-dropdown-item-wrap {
      position: relative;
    }
    .add-dropdown-item-wrap:hover .add-dropdown-submenu {
      display: block;
    }
    .add-dropdown-submenu .add-dropdown-item {
      padding: 0.3rem 0.6rem;
      font-size: 0.78rem;
    }
    .add-dropdown-submenu .add-dropdown-item svg {
      width: 13px;
      height: 13px;
    }
    .add-split-wrap,
    .toolbar-category-wrap,
    .toolbar-more-wrap {
      position: relative;
    }
    .toolbar-sep {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.12);
      margin: 0 0.1rem;
    }
    .toolbar-actions-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .toolbar-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .toolbar-action-btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
    }
    .toolbar-action-btn svg {
      width: 13px;
      height: 13px;
    }
    .toolbar-action-btn.run {
      border: none;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      color: #020208;
    }
    .toolbar-action-btn.run:hover {
      filter: brightness(1.05);
    }
    .canvas-empty-state {
      text-align: center;
      max-width: 360px;
    }
    .canvas-empty-state h1 {
      font-size: 1.3rem;
      margin-bottom: 0.35rem;
      letter-spacing: -0.01em;
    }
    .canvas-empty-state p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .canvas-viewport {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
      cursor: grab;
      background-image: radial-gradient(circle, rgba(255,255,255,0.18) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .canvas-viewport.is-panning {
      cursor: grabbing;
    }
    .zoom-controls {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 3px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .zoom-ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .zoom-ctrl-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }
    .zoom-ctrl-btn svg {
      width: 14px;
      height: 14px;
    }
    .zoom-ctrl-btn.is-locked {
      color: var(--accent, #7c6af7);
      background: rgba(124,106,247,0.12);
    }
    .zoom-ctrl-btn.is-locked:hover {
      background: rgba(124,106,247,0.2);
    }
    .zoom-ctrl-sep {
      width: 18px;
      height: 1px;
      background: var(--border-subtle);
      margin: 2px 0;
    }
    .canvas-nodes {
      position: absolute;
      top: 0;
      left: 0;
      width: 4000px;
      height: 4000px;
      padding: 24px;
      pointer-events: none;
      z-index: 1;
      transform-origin: 0 0;
    }
    .canvas-nodes.is-visible {
      pointer-events: auto;
    }
    .canvas-nodes.is-visible > * {
      pointer-events: auto;
    }
    .links-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .links-layer > g {
      pointer-events: auto;
    }
    .links-layer .link-hit-area {
      pointer-events: stroke;
      cursor: pointer;
      stroke-width: 12;
      stroke: transparent;
    }
    .links-layer .link-group:hover .link-path {
      stroke: rgba(255, 255, 255, 0.45);
    }
    .links-layer .link-delete-btn {
      pointer-events: auto;
      cursor: pointer;
      display: none;
    }
    .links-layer .link-group.is-selected .link-delete-btn {
      display: block;
    }
    .links-layer .link-delete-btn circle {
      fill: var(--bg-surface);
      stroke: rgba(255,255,255,0.4);
      stroke-width: 1.5;
      transition: fill 0.15s, stroke 0.15s;
    }
    .links-layer .link-delete-btn:hover circle {
      fill: rgba(244, 63, 94, 0.3);
      stroke: #f43f5e;
    }
    .links-layer .link-delete-btn path {
      fill: none;
      stroke: rgba(255,255,255,0.8);
      stroke-width: 2;
      stroke-linecap: round;
      pointer-events: none;
    }
    .links-layer .link-delete-btn:hover path {
      stroke: #fff;
    }
    .links-layer path.link-path {
      fill: none;
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 1.25;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      shape-rendering: geometricPrecision;
    }
    .links-layer path.link-temp {
      stroke: rgba(0, 212, 170, 0.6);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.95;
      vector-effect: non-scaling-stroke;
    }
    .links-layer path.link-flowing {
      stroke: rgba(255, 255, 255, 0.6);
      stroke-width: 1.25;
      stroke-linecap: round;
      filter: url(#link-glow);

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var prompt = params.get('prompt') || '';
      var input = document.getElementById('workflow-prompt');
      if (input) input.value = prompt;

      var WORKFLOW_SUGGESTIONS = [
        'Create a product launch campaign: generate 5 lifestyle images from a product photo, write social captions, and a 30-second video script',
        'Turn a product manual into a 2-minute training video with voiceover and animated diagrams',
        'Generate before/after images for a home improvement project, then create a short testimonial video',
        'Create a social media carousel: 3 product shots with different backgrounds, captions for each slide',
        'Generate a podcast intro: 30-second music bed with voiceover script, then export to video with waveform',
        'Create a LinkedIn video ad: script to AI voiceover, add B-roll stock footage, 15-second format',
        'Virtual staging: add modern furniture to empty room photos for a real estate listing',
        'Turn a blog post into a narrated explainer video with key points as on-screen text',
        'Create a product catalog: batch generate lifestyle images from product photos with consistent lighting',
        'Generate a safety training video: convert compliance checklist into animated infographics with voiceover',
        'Create a brand mood board: 4 images from a concept description, then write captions for each',
        'YouTube short: script to voiceover to video with matching B-roll, add captions',
        'Create a customer testimonial video: transcript to voiceover, add product shots and lower thirds',
        'Generate product mockups: place a product photo on different backgrounds for e-commerce',
        'Create an internal comms video: CEO message script to video with branded intro and outro'
      ];

      var workflowNameInput = document.getElementById('workflow-name');
      if (workflowNameInput) {
        workflowNameInput.addEventListener('focus', function () {
          this.select();
        });
      }

      var sparkleBtn = document.getElementById('prompt-sparkle-btn');
      if (sparkleBtn && input) {
        sparkleBtn.addEventListener('click', function () {
          var suggestion = WORKFLOW_SUGGESTIONS[Math.floor(Math.random() * WORKFLOW_SUGGESTIONS.length)];
          input.value = suggestion;
          input.focus();
        });
      }

      var TEMPLATE_IDEAS = [
        { page: 'Creative & Story', items: [
          'Create an anime storybook from my story text',
          'Generate a comic strip from my story script',
          'Create a webtoon episode with 8+ panels'
        ]},
        { page: 'Video', items: [
          'Make an AI talking-head video from a script',
          'Generate an age transition video from a photo',
          'Create short video clips with BGM',
          'Make a product unboxing storyboard video'
        ]},
        { page: 'Brand & Design', items: [
          'Design multiple logo concepts for my brand',
          'Generate a brand mockup pack with my logo',
          'Create architecture renderings from a sketch',
          'Design a game character sheet with multi-views',
          'Design game scene concept art in batch'
        ]},
        { page: 'E-commerce', items: [
          'Generate product promotion images for e-commerce',
          'Create live commerce material for streaming'
        ]},
        { page: 'Social & Short-form', items: [
          'Generate Douyin/TikTok vertical cover set',
          'Create Bilibili video thumbnails in batch',
          'Make Xiaohongshu style aesthetic images'
        ]},
        { page: 'Portrait & Personal', items: [
          'Generate cosplay photos from my selfie',
          'Restore and colorize an old damaged photo',
          'Swap portrait background to studio scene',
          'Generate hairstyle mockups from my photo',
          'Create multi-style wedding photo and video sets',
          'Predict future baby portraits from parents',
          'Turn my pet photo into artistic portraits'
        ]}
      ];

      var templatesBtn = document.getElementById('templates-btn');
      var templatesModal = document.getElementById('templates-modal');
      var templatesModalClose = document.getElementById('templates-modal-close');
      var templatesList = document.getElementById('templates-list');
      if (templatesBtn && templatesModal && templatesList) {
        templatesBtn.addEventListener('click', function () {
          var html = '';
          TEMPLATE_IDEAS.forEach(function (group) {
            html += '<div class="templates-category">' + group.page.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
            group.items.forEach(function (idea) {
              html += '<li>' + idea.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</li>';
            });
          });
          templatesList.innerHTML = html;
          templatesModal.classList.add('is-open');
          templatesModal.setAttribute('aria-hidden', 'false');
        });
        function closeTemplatesModal() {
          templatesModal.classList.remove('is-open');
          templatesModal.setAttribute('aria-hidden', 'true');
        }
        if (templatesModalClose) templatesModalClose.addEventListener('click', closeTemplatesModal);
        templatesModal.addEventListener('click', function (e) {
          if (e.target === templatesModal) closeTemplatesModal();
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && templatesModal.classList.contains('is-open')) closeTemplatesModal();
        });
        templatesList.addEventListener('click', function (e) {
          var li = e.target.closest('li');
          if (li && input) {
            input.value = li.textContent;
            input.focus();
            closeTemplatesModal();
          }
        });
      }

      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
          var active = document.activeElement;
          if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
          e.preventDefault();
          if (e.shiftKey) redo();
          else undo();
        }
        if (e.key === 'Escape') {
          if (linkingFrom !== null) {
            e.preventDefault();
            clearLinkingState();
            linkingFrom = null;
            linkingFromPort = 0;
            drawLinks();
          } else if (selectedLinkKey !== null) {
            e.preventDefault();
            selectedLinkKey = null;
            drawLinks();
          }
        }
      });

      var MAX_NODES = 30;
      var canvasNodes = document.getElementById('canvas-nodes');
      var canvasViewport = document.getElementById('canvas-viewport');
      var canvasInner = document.querySelector('.canvas-inner');
      var addEngineBtn = document.getElementById('add-engine-btn');
      var addFileBtn = document.getElementById('add-file-btn');
      var addPromptBtn = document.getElementById('add-prompt-btn');
      var addEngineMenu = document.getElementById('add-engine-menu');
      var linksGroup = document.getElementById('links-group');
      var linksLayer = document.getElementById('links-layer');

      if (!canvasNodes || !canvasViewport || !canvasInner || !linksGroup) return;

      var nodeCount = 0;
      var links = [];
      var undoHistory = [];
      var redoHistory = [];
      var canvasZoom = 1;
      var panX = 0, panY = 0;
      var isPanning = false, panStartX, panStartY;
      var canvasLocked = false;
      var linkingFrom = null;
      var linkingFromPort = 0;
      var tempLineEnd = { x: 0, y: 0 };
      var selectedNodeId = null;
      var selectedLinkKey = null;

      // ── Tab management ──────────────────────────────────────────────
      var tabStore = []; // [{ id, name, workflowId, state, undoHistory, redoHistory, zoom, panX, panY, nodeCount }]
      var activeTabId = null;
      var tabIdCounter = 0;

      function tabSaveActive() {
        var tab = tabStore.find(function (t) { return t.id === activeTabId; });
        if (!tab) return;
        tab.state = getState();
        tab.undoHistory = undoHistory.slice();
        tab.redoHistory = redoHistory.slice();
        tab.zoom = canvasZoom;
        tab.panX = panX;
        tab.panY = panY;
        tab.nodeCount = nodeCount;
        tab.workflowId = currentWorkflowId;
        var nameInput = document.getElementById('workflow-name');
        tab.name = nameInput ? nameInput.value : tab.name;
      }

      function tabActivate(id) {
        if (activeTabId === id) return;
        tabSaveActive();
        activeTabId = id;
        var tab = tabStore.find(function (t) { return t.id === id; });
        if (!tab) return;
        // clear canvas
        canvasNodes.querySelectorAll('.workflow-node').forEach(function (n) { n.remove(); });
        links = [];
        nodeCount = 0;
        undoHistory = tab.undoHistory ? tab.undoHistory.slice() : [];
        redoHistory = tab.redoHistory ? tab.redoHistory.slice() : [];
        currentWorkflowId = tab.workflowId || null;
        canvasZoom = tab.zoom || 1;
        panX = tab.panX || 0;
        panY = tab.panY || 0;
        selectNode(null);
        if (tab.state) setState(tab.state);
        nodeCount = tab.nodeCount || nodeCount;
        var nameInput = document.getElementById('workflow-name');
        if (nameInput) nameInput.value = tab.name || '';
        applyTransform();
        updateUndoRedoButtons();
        renderTabs();
      }

      function tabCreate(name, workflowId, state) {
        tabIdCounter++;
        var id = 'tab-' + tabIdCounter;
        var tab = { id: id, name: name || 'Untitled workflow', workflowId: workflowId || null, state: state || null, undoHistory: [], redoHistory: [], zoom: 1, panX: 0, panY: 0, nodeCount: 0 };
        tabStore.push(tab);
        return id;
      }

      function tabClose(id) {
        if (tabStore.length <= 1) return; // keep at least one tab
        var idx = tabStore.findIndex(function (t) { return t.id === id; });
        if (idx < 0) return;
        tabStore.splice(idx, 1);
        if (activeTabId === id) {
          var newTab = tabStore[Math.min(idx, tabStore.length - 1)];
          activeTabId = null;
          tabActivate(newTab.id);
        } else {
          renderTabs();
        }
      }

      function renderTabs() {
        var bar = document.getElementById('workflow-tab-bar');
        var addBtn = document.getElementById('workflow-tab-add');
        if (!bar) return;
        // remove existing tab els
        bar.querySelectorAll('.workflow-tab').forEach(function (el) { el.remove(); });
        tabStore.forEach(function (tab) {
          var el = document.createElement('div');
          el.className = 'workflow-tab' + (tab.id === activeTabId ? ' is-active' : '');
          el.setAttribute('data-tab-id', tab.id);
          var nameBtn = document.createElement('input');
          nameBtn.type = 'text';
          nameBtn.className = 'workflow-tab-name';
          nameBtn.value = tab.name;
          nameBtn.title = tab.name;
          nameBtn.addEventListener('click', function (e) { e.stopPropagation(); if (tab.id !== activeTabId) tabActivate(tab.id); });
          nameBtn.addEventListener('change', function () {
            tab.name = this.value || 'Untitled workflow';
            this.value = tab.name;
            if (tab.id === activeTabId) {
              var ni = document.getElementById('workflow-name');
              if (ni) ni.value = tab.name;
            }
          });
          var closeBtn = document.createElement('button');
          closeBtn.className = 'workflow-tab-close';
          closeBtn.setAttribute('aria-label', 'Close tab');
          closeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
          closeBtn.addEventListener('click', function (e) { e.stopPropagation(); tabClose(tab.id); });
          el.addEventListener('mousedown', function (e) { if (e.target !== closeBtn && !closeBtn.contains(e.target) && e.target !== nameBtn) tabActivate(tab.id); });
          el.appendChild(nameBtn);
          el.appendChild(closeBtn);
          bar.insertBefore(el, addBtn);
        });
      }

      // init with first tab
      (function () {
        var firstId = tabCreate('Untitled workflow');
        activeTabId = firstId;
      }());
      // ── End tab management ──────────────────────────────────────────
      var propertyPanel = document.getElementById('property-panel');
      var propertyPanelTitle = document.getElementById('property-panel-title');
      var propertyPanelBody = document.getElementById('property-panel-body');
      var propertyPanelEmpty = document.getElementById('property-panel-empty');
      var propertyPanelContent = document.getElementById('property-panel-content');
      var propertyPanelClose = document.getElementById('property-panel-close');

      function getCanvasRect() {
        return canvasViewport ? canvasViewport.getBoundingClientRect() : canvasNodes.getBoundingClientRect();
      }

      function getPortCounts(nodeType) {
        var isEngine = nodeType && (nodeType.indexOf('Image —') === 0 || nodeType.indexOf('Video —') === 0 || nodeType.indexOf('Audio —') === 0);
        var isFile = nodeType === 'File input';
        var isPrompt = nodeType === 'Prompt input';
        var isBot = nodeType && nodeType.indexOf('Bot') === 0;
        var isExportAll = nodeType === 'Bot — Export All';
        if (isEngine) return { inputs: 2, outputs: 1 };
        if (isFile) return { inputs: 0, outputs: 1 };
        if (isPrompt) return { inputs: 0, outputs: 1 };
        if (isExportAll) return { inputs: 1, outputs: 0 };
        if (isBot) return { inputs: 1, outputs: 1 };
        return { inputs: 1, outputs: 1 };
      }

      function getPortPosition(nodeEl, port, portIndex, portTotal) {
        var wr = getCanvasRect();
        var zoom = canvasZoom || 1;
        var idx = (portTotal > 0 && portIndex >= portTotal) ? portTotal - 1 : portIndex;
        var portEl = port === 'output'
          ? nodeEl.querySelector('.node-output[data-port-index="' + idx + '"]')
          : nodeEl.querySelector('.node-input[data-port-index="' + idx + '"]');
        if (portEl) {
          var r = portEl.getBoundingClientRect();
          return {
            x: (r.left + r.width / 2 - wr.left - panX) / zoom,
            y: (r.top + r.height / 2 - wr.top - panY) / zoom
          };
        }
        var r = nodeEl.getBoundingClientRect();
        var pct = (portTotal > 1) ? ((idx + 1) / (portTotal + 1)) * 100 : 50;
        var cy = (r.top + r.height * pct / 100 - wr.top - panY) / zoom;
        if (port === 'output') return { x: (r.right - wr.left - panX) / zoom, y: cy };
        return { x: (r.left - wr.left - panX) / zoom, y: cy };
      }

      function updatePortConnectionStates() {
        canvasNodes.querySelectorAll('.node-input, .node-output').forEach(function (port) {
          port.classList.remove('connected');
        });
        links.forEach(function (link) {
          var fromEl = canvasNodes.querySelector('.workflow-node[data-id="' + link.from + '"]');
          var toEl = canvasNodes.querySelector('.workflow-node[data-id="' + link.to + '"]');
          if (fromEl) {
            var outPort = fromEl.querySelector('.node-output[data-port-index="' + (link.fromPort || 0) + '"]');
            if (outPort) outPort.classList.add('connected');
          }
          if (toEl) {
            var toPort = link.toPort != null ? link.toPort : 0;
            var toCounts = getPortCounts(toEl.getAttribute('data-type'));
            if (toCounts.inputs > 0 && toPort >= toCounts.inputs) toPort = toCounts.inputs - 1;
            var inPort = toEl.querySelector('.node-input[data-port-index="' + toPort + '"]');
            if (inPort) inPort.classList.add('connected');
          }
        });
      }

      function setFlowingLinks(active) {
        var flowingBars = linksGroup.querySelectorAll('path.link-flowing-bar');
        flowingBars.forEach(function (p) { p.remove(); });
        if (!active) return;
        var paths = linksGroup.querySelectorAll('path[data-from][data-to]:not(.link-temp)');
        var fromId = active.from;
        var toId = active.to;
        var nodeId = active.node;
        paths.forEach(function (p) {
          var pFrom = p.getAttribute('data-from');
          var pTo = p.getAttribute('data-to');
          var match = nodeId
            ? (pFrom === nodeId || pTo === nodeId)
            : (fromId && toId)
              ? (pFrom === fromId && pTo === toId)
              : (toId ? pTo === toId : fromId ? pFrom === fromId : false);
          if (match) {
            var clone = p.cloneNode(true);
            clone.classList.add('link-flowing', 'link-flowing-bar');
            clone.removeAttribute('data-from');
            clone.removeAttribute('data-to');
            p.parentNode.appendChild(clone);

      function linkPath(x1, y1, x2, y2, offset, startOffset) {
        var dx = x2 - x1, dy = y2 - y1;
        var len = Math.sqrt(dx * dx + dy * dy) || 1;
        var perpX = -dy / len, perpY = dx / len;
        var cx = (x1 + x2) / 2;
        var c1x = cx, c1y = y1, c2x = cx, c2y = y2;
        if (offset && offset !== 0) {
          c1x += perpX * offset;
          c1y += perpY * offset;
          c2x += perpX * offset;
          c2y += perpY * offset;
        }
        if (startOffset && startOffset !== 0) {
          c1x += perpX * startOffset;
          c1y += perpY * startOffset;
          c2x += perpX * startOffset;
          c2y += perpY * startOffset;
        }
        return 'M' + x1 + ',' + y1 + ' C' + c1x + ',' + c1y + ' ' + c2x + ',' + c2y + ' ' + x2 + ',' + y2;
      }

      function drawLinks() {
        var zoom = canvasZoom || 1;
        var w = 4000, h = 4000;
        linksLayer.setAttribute('width', w);
        linksLayer.setAttribute('height', h);
        linksGroup.innerHTML = '';
        var byPair = {};
        var bySource = {};
        links.forEach(function (link) {
          var key = link.from + '|' + link.to;
          if (!byPair[key]) byPair[key] = [];
          byPair[key].push(link);
          var srcKey = link.from + '|' + (link.fromPort != null ? link.fromPort : 0);
          if (!bySource[srcKey]) bySource[srcKey] = [];
          bySource[srcKey].push(link);
        });
        links.forEach(function (link) {
          var fromEl = canvasNodes.querySelector('.workflow-node[data-id="' + link.from + '"]');
          var toEl = canvasNodes.querySelector('.workflow-node[data-id="' + link.to + '"]');
          if (!fromEl || !toEl) return;
          var fromCounts = getPortCounts(fromEl.getAttribute('data-type'));
          var toCounts = getPortCounts(toEl.getAttribute('data-type'));
          var fromPort = link.fromPort != null ? link.fromPort : 0;
          var toPort = link.toPort != null ? link.toPort : 0;
          var fromP = getPortPosition(fromEl, 'output', fromPort, fromCounts.outputs);
          var toP = getPortPosition(toEl, 'input', toPort, toCounts.inputs);
          var pairKey = link.from + '|' + link.to;
          var pairGroup = byPair[pairKey] || [];
          var pairIdx = pairGroup.indexOf(link);
          if (pairIdx < 0) pairIdx = 0;
          var pairN = pairGroup.length;
          var offset = pairN > 1 ? (pairIdx - (pairN - 1) / 2) * 14 : 0;
          var srcKey = link.from + '|' + fromPort;
          var srcGroup = bySource[srcKey] || [];
          var srcIdx = srcGroup.indexOf(link);
          if (srcIdx < 0) srcIdx = 0;
          var srcN = srcGroup.length;
          var startOffset = srcN > 1 ? (srcIdx - (srcN - 1) / 2) * 14 : 0;
          var d = linkPath(fromP.x, fromP.y, toP.x, toP.y, offset, startOffset);
          var centerX = (fromP.x + toP.x) / 2;
          var centerY = (fromP.y + toP.y) / 2;
          var linkKey = link.from + '-' + link.fromPort + '-' + link.to + '-' + link.toPort;
          var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.setAttribute('class', 'link-group' + (selectedLinkKey === linkKey ? ' is-selected' : ''));
          g.setAttribute('data-from', link.from);
          g.setAttribute('data-to', link.to);
          g.setAttribute('data-from-port', fromPort);
          g.setAttribute('data-to-port', toPort);
          var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('class', 'link-hit-area');
          path.setAttribute('d', d);
          path.setAttribute('pathLength', '1');
          path.setAttribute('stroke-width', '12');
          path.setAttribute('stroke', 'transparent');
          g.appendChild(path);
          var pathVisible = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          pathVisible.setAttribute('class', 'link-path');
          pathVisible.setAttribute('d', d);
          pathVisible.setAttribute('pathLength', '1');
          pathVisible.setAttribute('data-from', link.from);
          pathVisible.setAttribute('data-to', link.to);
          pathVisible.setAttribute('pointer-events', 'none');
          g.appendChild(pathVisible);
          var deleteBtn = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          deleteBtn.setAttribute('class', 'link-delete-btn');
          deleteBtn.setAttribute('transform', 'translate(' + centerX + ',' + centerY + ')');
          var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('r', '10');
          deleteBtn.appendChild(circle);
          var xPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          xPath.setAttribute('d', 'M-4-4 L4 4 M4-4 L-4 4');
          deleteBtn.appendChild(xPath);
          g.appendChild(deleteBtn);
          path.addEventListener('click', function (e) {
            e.stopPropagation();
            selectedLinkKey = linkKey;
            canvasNodes.querySelectorAll('.link-group.is-selected').forEach(function (gr) { gr.classList.remove('is-selected'); });
            g.classList.add('is-selected');

          deleteBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            pushState();
            links = links.filter(function (l) {
              return !(l.from === link.from && (l.fromPort || 0) === fromPort && l.to === link.to && (l.toPort || 0) === toPort);
            });
            selectedLinkKey = null;
            drawLinks();
          });
          linksGroup.appendChild(g);
        });
        if (linkingFrom !== null) {
          var fromEl = canvasNodes.querySelector('.workflow-node[data-id="' + linkingFrom + '"]');
          if (fromEl) {
            var fromCounts = getPortCounts(fromEl.getAttribute('data-type'));

            var endX = tempLineEnd.x;
            var endY = tempLineEnd.y;

            var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('class', 'link-temp');
            path.setAttribute('d', linkPath(fromP.x, fromP.y, endX, endY, 0));
            linksGroup.appendChild(path);
          }
        }
        updatePortConnectionStates();
      }

          var audFormatSelect = propertyPanelContent.querySelector('#prop-audio-format');

          var botTokensInput = propertyPanelContent.querySelector('#prop-bot-max-tokens');
          if (botTokensInput && isBot) botTokensInput.addEventListener('change', function () { nodeEl.setAttribute('data-bot-max-tokens', this.value); });
          var promptWeightSelect = propertyPanelContent.querySelector('#prop-prompt-weight');
          if (promptWeightSelect && type === 'Prompt input') promptWeightSelect.addEventListener('change', function () { nodeEl.setAttribute('data-prompt-weight', this.value); });
        } else {

      }

      function makeNodeDraggable(node) {
        var dragging = null, dragOffX, dragOffY, startMouseX, startMouseY, hasMoved;
        node.addEventListener('mousedown', function (e) {
          if (e.target.classList.contains('node-output') || e.target.classList.contains('node-input') || e.target.closest('.node-action-btn') || e.target.closest('.node-resize-handle') || e.target.closest('.node-run-dropdown-menu') || e.target.classList.contains('node-content-input') || e.target.classList.contains('node-bot-output') || e.target.closest('.node-bot-output-wrap') || e.target.closest('.node-image-upload-area') || e.target.closest('.node-upload-icon')) return;
          if (e.button !== 0) return;
          if (canvasLocked) { selectNode(node); return; }
          e.preventDefault();
          e.stopPropagation();
          dragging = node;
          hasMoved = false;
          startMouseX = e.clientX;
          startMouseY = e.clientY;
          var rect = node.getBoundingClientRect();
          dragOffX = e.clientX - rect.left;
          dragOffY = e.clientY - rect.top;
        });
        document.addEventListener('mousemove', function (e) {
          if (!dragging) return;
          if (Math.abs(e.clientX - startMouseX) > 3 || Math.abs(e.clientY - startMouseY) > 3) hasMoved = true;
          var wr = getCanvasRect();
          var zoom = canvasZoom || 1;
          var newLeft = (e.clientX - wr.left - panX) / zoom - dragOffX / zoom;
          var newTop = (e.clientY - wr.top - panY) / zoom - dragOffY / zoom;
          dragging.style.left = newLeft + 'px';
          dragging.style.top = newTop + 'px';
          dragging.setAttribute('data-x', newLeft);
          dragging.setAttribute('data-y', newTop);
          drawLinks();
        });
        document.addEventListener('mouseup', function () {
          if (dragging && !hasMoved) {
            selectNode(dragging);
          }
          dragging = null;
        });
      }

      function makeNodeResizable(node, nodesRect) {
        var handle = node.querySelector('.node-resize-handle');
        if (!handle) return;
        var resizing = false;
        var startX, startY, startW, startH;
        var minW = 160, maxW = 400, minH = 90, maxH = 320;
        handle.addEventListener('mousedown', function (e) {
          if (e.button !== 0) return;
          if (canvasLocked) return;
          e.preventDefault();
          e.stopPropagation();
          resizing = true;
          startX = e.clientX;
          startY = e.clientY;
          startW = node.offsetWidth;
          startH = node.offsetHeight;
        });
        document.addEventListener('mousemove', function (e) {
          if (!resizing) return;
          var dw = e.clientX - startX;
          var dh = e.clientY - startY;
          var newW = Math.max(minW, Math.min(maxW, startW + dw));
          var newH = Math.max(minH, Math.min(maxH, startH + dh));
          node.style.width = newW + 'px';
          node.style.height = newH + 'px';
          node.setAttribute('data-width', newW);
          node.setAttribute('data-height', newH);
          drawLinks();
        });
        document.addEventListener('mouseup', function () {
          resizing = false;
        });
      }

      function getNodeTheme(nodeType) {
        if (!nodeType) return 'theme-blue';
        if (nodeType === 'Bot — Export All') return 'theme-pink';
        if (nodeType.indexOf('Image —') === 0 || nodeType === 'Image') return 'theme-blue';
        if (nodeType.indexOf('Video —') === 0 || nodeType === 'Video') return 'theme-violet';
        if (nodeType.indexOf('Audio —') === 0 || nodeType === 'Audio') return 'theme-amber';
        if (nodeType.indexOf('Bot') === 0) return 'theme-pink';
        if (nodeType === 'File input') return 'theme-emerald';
        if (nodeType === 'Prompt input') return 'theme-cyan';
        return 'theme-blue';
      }

        var actions = [];

        var isInputNode = nodeType === 'File input' || nodeType === 'Prompt input';
        if (!isExportAll && !isInputNode) actions.push({ id: 'run', label: 'Run', icon: 'M5 3l14 9-14 9V3z' });
        if (isEngine) actions.push({ id: 'export', label: 'Export', icon: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3' });
        if (isExportAll) actions.push({ id: 'export-all', label: 'Export all', icon: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3' });
        if (!isExportAll) actions.push({ id: 'copy', label: 'Copy', icon: 'M11 9h9q2 0 2 2v9q0 2-2 2h-9q-2 0-2-2v-9q0-2 2-2z M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1' });

        return actions;

      function buildPorts(count, type) {
        if (count <= 0) return '';
        var html = '';
        for (var i = 0; i < count; i++) {
          var pct = count > 1 ? ((i + 1) / (count + 1)) * 100 : 50;

        }
        return html;

          } else if (a.id === 'export-all') {

          } else if (a.id !== 'export') {
            html += '<button type="button" class="node-action-btn" data-action="' + a.id + '" title="' + a.label + '" aria-label="' + a.label + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="' + a.icon + '"/></svg></button>';
          }

        html += '</div>' +

      function addNode(nodeType, optPosition) {
        nodeType = nodeType || 'Prompt input';
        canvasNodes.classList.add('is-visible');
        if (nodeCount >= MAX_NODES) return;
        nodeCount++;
        var id = 'n' + nodeCount;
        var viewportRect = canvasViewport ? canvasViewport.getBoundingClientRect() : { width: 600, height: 400 };
        var centerX, centerY;
        if (optPosition && typeof optPosition.x === 'number' && typeof optPosition.y === 'number') {
          centerX = optPosition.x;
          centerY = optPosition.y;
        } else {
          var padding = 24;
          var step = 300;
          var cols = 2;
          var row = Math.floor((nodeCount - 1) / cols);
          var col = (nodeCount - 1) % cols;
          centerX = padding + col * step + (viewportRect.width > 400 ? 40 : 20);
          centerY = padding + row * 160;
        }
        var theme = getNodeTheme(nodeType);
        var title = nodeType + ' #' + nodeCount;
        var isEngine = nodeType && (nodeType.indexOf('Image —') === 0 || nodeType.indexOf('Video —') === 0 || nodeType.indexOf('Audio —') === 0);

        var counts = getPortCounts(nodeType);

        node.style.left = centerX + 'px';
        node.style.top = centerY + 'px';

          contentHtml = '<button type="button" class="node-export-all-btn" aria-label="Export all">Export all</button>';
        } else if (nodeType === 'Prompt input') {
          contentHtml = '<textarea class="node-content-input" placeholder="' + placeholder.replace(/"/g, '&quot;') + '" rows="2"></textarea>';
        } else if (nodeType && nodeType.indexOf('Bot') === 0) {
          contentHtml = '<div class="node-bot-content">' +
            '<textarea class="node-content-input" placeholder="' + placeholder.replace(/"/g, '&quot;') + '" rows="2"></textarea>' +
            '<div class="node-bot-output-wrap"><span class="node-bot-output-label">Generated Output</span><textarea class="node-bot-output" readonly rows="2" placeholder="Run to see improved prompt..."></textarea></div>' +
            '</div>';
        } else if (nodeType === 'File input') {
          contentHtml = '<input type="file" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt" class="node-file-input" style="display:none" aria-label="Upload file">' +
            '<div class="node-image-upload-area">' +
              '<span class="node-image-placeholder-text">Upload or select a file...</span>' +
              '<div class="node-image-preview" style="display:none">' +
                '<img class="node-image-preview-img" alt="">' +
                '<span class="node-image-filename"></span>' +
              '</div>' +
            '</div>';
        } else if (isEngine) {
          contentHtml = '<div class="node-output-result">' +
            '<span class="node-placeholder node-output-placeholder">' + placeholder + '</span>' +
            '<img class="node-output-image" style="display:none" alt="">' +
            '<video class="node-output-video" style="display:none" controls playsinline></video>' +
            '</div>' +
            '<div class="node-output-loading" style="display:none"><div class="node-progress-fill"></div></div>';
        } else {
          contentHtml = '<span class="node-placeholder">' + placeholder + '</span>';
        }
        var isFileInput = nodeType === 'File input';
        var editIcon = (isEngine || nodeType === 'Prompt input' || (nodeType && nodeType.indexOf('Bot') === 0)) ? '' : (isFileInput
          ? '<button type="button" class="node-upload-icon" aria-label="Upload file" title="Upload file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>'
          : '<svg class="node-edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>');
        node.innerHTML = buildPorts(counts.inputs, 'input') +
          '<div class="node-header">' + title + '</div>' +
          '<div class="node-body">' +
            '<div class="node-content-inner">' +
              contentHtml +

            '<div class="node-error" style="display:none" role="alert"><svg class="node-error-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><rect x="10.5" y="6" width="3" height="6" fill="currentColor" rx="0.5"/><circle cx="12" cy="16" r="2" fill="currentColor"/></svg><svg class="node-hint-icon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4m0 4h.01"/></svg><span class="node-error-text"></span></div>' +
          '</div>' +
          buildPorts(counts.outputs, 'output') +
          buildFooterHTML(nodeType);
        canvasNodes.appendChild(node);

        makeNodeResizable(node, viewportRect);

        var contentInput = node.querySelector('.node-content-input');
        if (contentInput) {
          contentInput.addEventListener('input', function () { clearNodeError(node); });
        }

        var exportAllBtn = node.querySelector('.node-export-all-btn');
        if (exportAllBtn && isExportAll) {
          exportAllBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            exportAllGeneratedContent();
          });
        }

        if (isFileInput) {
          var fileInput = node.querySelector('.node-file-input');
          var uploadArea = node.querySelector('.node-image-upload-area');
          var uploadIcon = node.querySelector('.node-upload-icon');
          var placeholderText = node.querySelector('.node-image-placeholder-text');
          var preview = node.querySelector('.node-image-preview');
          var previewImg = node.querySelector('.node-image-preview-img');
          var filenameEl = node.querySelector('.node-image-filename');
          if (uploadIcon && fileInput) {
            uploadIcon.addEventListener('click', function (e) {
              e.stopPropagation();
              e.preventDefault();
              fileInput.click();
            });
          }
          if (uploadArea && fileInput) {
            uploadArea.addEventListener('click', function (e) {
              e.stopPropagation();
              fileInput.click();
            });
            fileInput.addEventListener('change', function () {
              var file = this.files && this.files[0];
              if (!file) return;
              var ext = (file.name.split('.').pop() || '').toLowerCase();
              var format = 'document';
              if (file.type.startsWith('image/')) format = 'image';
              else if (file.type.startsWith('video/')) format = 'video';
              else if (file.type.startsWith('audio/')) format = 'audio';
              else if (['pdf', 'doc', 'docx', 'txt'].indexOf(ext) >= 0) format = 'document';
              else return;
              node.setAttribute('data-file-type', format);
              node.setAttribute('data-file-filename', file.name);
              clearNodeError(node);
              if (placeholderText) placeholderText.style.display = 'none';
              if (preview) preview.style.display = 'flex';
              if (filenameEl) filenameEl.textContent = file.name;
              if (previewImg) previewImg.style.display = format === 'image' ? '' : 'none';
              if (uploadIcon) uploadIcon.style.display = 'none';
              if (format === 'image') {
                var reader = new FileReader();
                reader.onload = function () {
                  var dataUrl = reader.result;
                  node.setAttribute('data-image-data', dataUrl);
                  if (previewImg) previewImg.src = dataUrl;
                  if (selectedNodeId === id && propertyPanelContent) {
                    var fn = propertyPanelContent.querySelector('.property-image-filename');
                    var btn = propertyPanelContent.querySelector('.property-change-image-btn');
                    if (fn) fn.textContent = file.name;
                    if (btn) btn.textContent = 'Change';
                  }
                };
                reader.readAsDataURL(file);
              } else {
                node.removeAttribute('data-image-data');
                if (selectedNodeId === id && propertyPanelContent) {
                  var fn = propertyPanelContent.querySelector('.property-image-filename');
                  var btn = propertyPanelContent.querySelector('.property-change-image-btn');
                  if (fn) fn.textContent = file.name;
                  if (btn) btn.textContent = 'Change';
                }
              }
            });
          }
        }

        node.querySelectorAll('.node-output').forEach(function (port) {
          var portIdx = parseInt(port.getAttribute('data-port-index') || '0', 10);
          port.addEventListener('mousedown', function (e) {
            if (e.button !== 0) return;
            if (canvasLocked) return;
            e.preventDefault();
            e.stopPropagation();
            linkingFrom = id;
            linkingFromPort = portIdx;
            port.classList.add('linking');
            document.body.classList.add('is-linking');
            var wr = getCanvasRect();
            var zoom = canvasZoom || 1;
            tempLineEnd = { x: (e.clientX - wr.left - panX) / zoom, y: (e.clientY - wr.top - panY) / zoom };
            drawLinks();
          });
          port.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            e.stopPropagation();
            if (canvasLocked) return;
            var before = links.length;
            links = links.filter(function (l) { return !(l.from === id && (l.fromPort || 0) === portIdx); });
            if (links.length < before) { pushState(); drawLinks(); }
          });
        });
        node.querySelectorAll('.node-input').forEach(function (port) {
          var portIdx = parseInt(port.getAttribute('data-port-index') || '0', 10);
          port.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var before = links.length;
            links = links.filter(function (l) { return !(l.to === id && (l.toPort || 0) === portIdx); });
            if (links.length < before) { pushState(); drawLinks(); }
          });
        });

        node.querySelectorAll('.node-action-btn').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var action = this.getAttribute('data-action');
            if (action === 'delete') {
              pushState();
              links = links.filter(function (l) { return l.from !== id && l.to !== id; });
              node.remove();
              nodeCount--;
              selectedLinkKey = null;
              if (selectedNodeId === id) selectNode(null);
              drawLinks();
            } else if (action === 'copy') {
              var cloneData = { type: nodeType, x: parseFloat(node.getAttribute('data-x')) + 30, y: parseFloat(node.getAttribute('data-y')) + 30 };
              addNode(nodeType);
              var newNode = canvasNodes.querySelector('.workflow-node:last-child');
              if (newNode) {
                newNode.setAttribute('data-x', cloneData.x);
                newNode.setAttribute('data-y', cloneData.y);
                newNode.style.left = cloneData.x + 'px';
                newNode.style.top = cloneData.y + 'px';
              }
            } else if (action === 'run') {
              runWorkflow(id);
            } else if (action === 'export') {
              var img = node.querySelector('.node-output-image');
              var vid = node.querySelector('.node-output-video');
              var url = (img && img.src) || (vid && vid.src);
              if (url) {
                var a = document.createElement('a');
                a.href = url;
                a.download = (vid && vid.src) ? 'wedding-video.mp4' : 'wedding-image.png';
                a.rel = 'noopener';
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
              }
            } else if (action === 'export-all') {
              exportAllGeneratedContent();
            }
          });
        });

        drawLinks();
        scheduleZoomFit();
        return id;
      }

      var zoomFitDebounceTimer = null;
      function scheduleZoomFit() {
        if (zoomFitDebounceTimer) clearTimeout(zoomFitDebounceTimer);
        zoomFitDebounceTimer = setTimeout(function () {
          zoomFitDebounceTimer = null;
          zoomFit();
        }, 100);
      }

      function clearCanvas(skipHistory) {
        if (!skipHistory) pushState();
        links = [];
        linkingFrom = null;
        linkingFromPort = 0;
        selectNode(null);
        var nodes = canvasNodes.querySelectorAll('.workflow-node');
        nodes.forEach(function (n) { n.remove(); });
        nodeCount = 0;
        drawLinks();
      }

      function getNodeContent(nodeEl) {
        var input = nodeEl.querySelector('.node-content-input');
        if (input) return input.value || '';
        var type = nodeEl.getAttribute('data-type');
        if (type === 'File input') {
          var imgData = nodeEl.getAttribute('data-image-data');
          if (imgData) return imgData;
          return nodeEl.getAttribute('data-file-filename') || '';
        }
        var ph = nodeEl.querySelector('.node-placeholder');
        return ph ? ph.textContent : '';
      }
      function setNodeContent(nodeEl, content) {
        var input = nodeEl.querySelector('.node-content-input');
        if (input) { input.value = content || ''; clearNodeError(nodeEl); return; }
        var type = nodeEl.getAttribute('data-type');
        if (type === 'File input') {
          var placeholderText = nodeEl.querySelector('.node-image-placeholder-text');
          var preview = nodeEl.querySelector('.node-image-preview');
          var previewImg = nodeEl.querySelector('.node-image-preview-img');
          var filenameEl = nodeEl.querySelector('.node-image-filename');
          clearNodeError(nodeEl);
          if (content) {
            if (content.indexOf('data:image/') === 0) {
              nodeEl.setAttribute('data-image-data', content);
              nodeEl.setAttribute('data-file-type', 'image');
              var m = content.match(/data:image\/(\w+);/);
              var name = m ? 'image.' + m[1] : 'image.png';
              nodeEl.setAttribute('data-file-filename', name);
              if (placeholderText) placeholderText.style.display = 'none';
              if (preview) preview.style.display = 'flex';
              if (previewImg) { previewImg.src = content; previewImg.style.display = ''; }
              if (filenameEl) filenameEl.textContent = name;
            } else {
              nodeEl.removeAttribute('data-image-data');
              nodeEl.setAttribute('data-file-filename', content);
              var ext = (content.split('.').pop() || '').toLowerCase();
              var fmt = ['pdf', 'doc', 'docx', 'txt'].indexOf(ext) >= 0 ? 'document' : (['mp4', 'webm', 'mov', 'avi'].indexOf(ext) >= 0 ? 'video' : 'audio');
              nodeEl.setAttribute('data-file-type', fmt);
              if (placeholderText) placeholderText.style.display = 'none';
              if (preview) preview.style.display = 'flex';
              if (previewImg) previewImg.style.display = 'none';
              if (filenameEl) filenameEl.textContent = content;
            }
            var uploadIconEl = nodeEl.querySelector('.node-upload-icon');
            if (uploadIconEl) uploadIconEl.style.display = 'none';
          } else {
            nodeEl.removeAttribute('data-image-data');
            nodeEl.removeAttribute('data-file-filename');
            nodeEl.removeAttribute('data-file-type');
            if (placeholderText) placeholderText.style.display = '';
            if (preview) preview.style.display = 'none';
            var uploadIconEl = nodeEl.querySelector('.node-upload-icon');
            if (uploadIconEl) uploadIconEl.style.display = '';
          }
          return;
        }
        var ph = nodeEl.querySelector('.node-placeholder');
        if (ph) ph.textContent = content || '';
      }

      function getState() {
        var nodes = [];
        canvasNodes.querySelectorAll('.workflow-node').forEach(function (n) {

          minX = Math.min(minX, nx);

          maxX = Math.max(maxX, nx + nw);

        var pw = wr.width;

      function generateWorkflowFromPrompt(promptText) {
        var plan = getDefaultWorkflowPlan(promptText);
        if (!plan.nodes.length) return;
        pushState();
        clearCanvas(true);
        var padding = 24;
        var stepY = 130;
        var colWidth = 280;
        var ids = [];
        var isWedding = plan.nodes.length > 6 && plan.nodes[0] === 'File input' && plan.nodes[1] === 'Prompt input' && plan.nodes[6] && plan.nodes[6].indexOf('Image —') === 0;
        plan.nodes.forEach(function (nodeType, i) {
          var x, y;
        if (isWedding) {
          if (nodeType === 'File input') {
            x = padding;
            y = padding;
          } else if (nodeType === 'Prompt input') {
            var promptIdx = plan.nodes.slice(0, i).filter(function (n) { return n === 'Prompt input'; }).length;
            x = padding + colWidth;
            y = padding + promptIdx * stepY;
          } else if (nodeType === 'Bot — Export All') {
            x = padding + 3 * colWidth;
            y = padding + 2 * stepY;
          } else {
            var engineIdx = plan.nodes.slice(0, i).filter(function (n) { return n !== 'File input' && n !== 'Prompt input' && n !== 'Bot — Export All'; }).length;
            x = padding + 2 * colWidth;
            y = padding + engineIdx * stepY;
          }
          } else {
            var isInput = nodeType === 'File input' || nodeType === 'Prompt input';
            if (isInput) {
              var inputIdx = plan.nodes.slice(0, i).filter(function (n) { return n === 'File input' || n === 'Prompt input'; }).length;
              x = padding;
              y = padding + inputIdx * stepY;
            } else if (nodeType === 'Bot — Export All') {
              x = padding + 2 * colWidth;
              y = padding + stepY;
            } else {
              var engIdx = plan.nodes.slice(0, i).filter(function (n) { return n !== 'File input' && n !== 'Prompt input' && n !== 'Bot — Export All'; }).length;
              x = padding + colWidth;
              y = padding + engIdx * stepY;
            }
          }
          var id = addNode(nodeType, { x: x, y: y });
          if (id) ids.push(id);
        });
        plan.links.forEach(function (lp) {
          if (ids[lp.from] && ids[lp.to]) {
            links.push({
              from: ids[lp.from],
              fromPort: lp.fromPort || 0,
              to: ids[lp.to],
              toPort: lp.toPort || 0
            });
          }
        });
        if (isWedding) {
          var weddingPrompts = [
            'Classic romantic — soft lighting, natural poses, bouquet and veil details',
            'Vintage — film grain, warm tones, nostalgic 1920s style',
            'Modern editorial — clean lines, dramatic lighting, high fashion',
            'Cinematic — movie-like composition, cinematic color grading',
            'Artistic — dreamy, ethereal, artistic portrait style'
          ];
          weddingPrompts.forEach(function (text, idx) {
            var promptId = ids[1 + idx];
            if (promptId) {
              var nodeEl = canvasNodes.querySelector('.workflow-node[data-id="' + promptId + '"]');
              if (nodeEl) setNodeContent(nodeEl, text);
            }
          });
          var fileNodeId = ids[0];

            var fileNode = canvasNodes.querySelector('.workflow-node[data-id="' + fileNodeId + '"]');
            if (fileNode) showNodeHint(fileNode, 'Upload a file to get started');
          }
        }
        drawLinks();
      }

      function showGeneratingProgress(promptText) {
        var overlay = document.getElementById('generating-overlay');
        var hint = document.getElementById('generating-hint');
        var fill = document.getElementById('generating-progress-fill');
        if (!overlay || !hint || !fill) return;
        if (promptSendBtn) promptSendBtn.disabled = true;
        overlay.classList.add('is-visible');
        overlay.setAttribute('aria-hidden', 'false');
        hint.textContent = 'Analyzing intent...';
        fill.style.width = '10%';
        var start = Date.now();
        var duration = 5000;
        var minDisplayTime = 4000;
        var minAnalyzingTime = 2500;
        var tick = function () {
          var elapsed = Date.now() - start;
          var pct = Math.min(95, 10 + (elapsed / duration) * 85);
          fill.style.width = pct + '%';
          if (elapsed < duration) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        function finish(resultText) {
          var elapsed = Date.now() - start;
          var waitForAnalyzing = Math.max(0, minAnalyzingTime - elapsed);
          setTimeout(function () {
            hint.textContent = 'Generating workflow...';
            fill.style.width = '100%';
            var remaining = Math.max(0, minDisplayTime - elapsed - waitForAnalyzing) + 400;
            setTimeout(function () {
              overlay.classList.remove('is-visible');
              overlay.setAttribute('aria-hidden', 'true');
              fill.style.width = '0%';
              if (promptSendBtn) promptSendBtn.disabled = false;
              generateWorkflowFromPrompt(resultText || promptText);
            }, remaining);
          }, waitForAnalyzing);
        }
        fetch(LLM_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: promptText }),
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.text) {
              apiResult = data.text;
              finish(data.text);
            } else {
              throw new Error(data.error || 'No response');
            }
          })
          .catch(function () {
            finish(promptText);
          });
      }

            tabActivate(newId);
            currentWorkflowId = w.id;
          });
        }

        renderTabs();
        var idParam = (new URLSearchParams(window.location.search)).get('id');
        if (idParam) {
          loadWorkflowById(idParam);
          var tab = tabStore.find(function (t) { return t.id === activeTabId; });
          if (tab) {
            var ni = document.getElementById('workflow-name');
            tab.name = ni ? ni.value : tab.name;
            renderTabs();
          }
        }
        applyZoom(1);
        updateUndoRedoButtons();
      })();

      document.addEventListener('click', function () {
        [addEngineMenu, document.getElementById('more-actions-menu'), document.getElementById('profile-menu'), document.getElementById('settings-menu')].forEach(function (m) {
          if (m) m.classList.remove('is-open');
        });
        var profileBtnEl = document.getElementById('profile-btn');
        var settingsBtnEl = document.getElementById('settings-btn');
        if (profileBtnEl) profileBtnEl.setAttribute('aria-expanded', 'false');
        if (settingsBtnEl) settingsBtnEl.setAttribute('aria-expanded', 'false');
        canvasNodes.querySelectorAll('.node-run-dropdown-menu.is-open').forEach(function (m) {
          m.classList.remove('is-open');
        });
        if (addEngineBtn) addEngineBtn.setAttribute('aria-expanded', 'false');
      });
    })();
  </script>
</body>
</html>
