<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — VoooAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050509;
      --bg-card: #111119;
      --accent-cyan: #00d4aa;
      --accent-magenta: #e040fb;
      --text-primary: #f0f0f5;
      --text-muted: #8b8ba3;
      --border-subtle: rgba(255,255,255,0.06);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(0,212,170,0.18), transparent 55%),
                  radial-gradient(circle at bottom, rgba(224,64,251,0.18), transparent 55%),
                  var(--bg-deep);
      font-family: 'Outfit', sans-serif;
      color: var(--text-primary);
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
      padding: 2.25rem 2rem 2.5rem;
      box-shadow: 0 22px 60px rgba(0,0,0,0.7);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1.5rem;
      text-decoration: none;
      color: inherit;
    }
    .logo:hover {
      opacity: 0.9;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 100%; height: 100%; }
    .logo-text {
      font-weight: 600;
      letter-spacing: -0.02em;
      font-size: 1.2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    p.subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }
    .field {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--text-muted);
    }
    input {
      width: 100%;
      padding: 0.75rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
      background: #080810;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
    }
    input::placeholder {
      color: rgba(139,139,163,0.85);
    }
    input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px rgba(0,212,170,0.35);
    }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .remember input {
      width: auto;
      accent-color: var(--accent-cyan);
      box-shadow: none;
    }
    a.small {
      font-size: 0.8rem;
      color: var(--accent-cyan);
      text-decoration: none;
    }
    a.small:hover {
      text-decoration: underline;
    }
    .btn-primary {
      width: 100%;
      margin-bottom: 0.75rem;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      color: #020206;
      font-weight: 600;
      font-size: 0.98rem;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(0,0,0,0.75);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 22px 55px rgba(0,0,0,0.8);
    }
    .hint {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .hint a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 500;
    }
    .hint a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-v-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#00d4aa"/>
              <stop offset="100%" style="stop-color:#e040fb"/>
            </linearGradient>
            <filter id="logo-glow">
              <feGaussianBlur stdDeviation="0.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logo-v-gradient)" stroke-width="1.2" filter="url(#logo-glow)"/>
          <circle cx="16" cy="16" r="10" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="1"/>
          <circle cx="16" cy="16" r="6" fill="none" stroke="rgba(0,0,0,0.6)" stroke-width="0.8"/>
          <path d="M10 10 L16 22 L22 10" fill="none" stroke="url(#logo-v-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#logo-glow)"/>
        </svg>
      </div>
      <div class="logo-text">VoooAI</div>
    </a>
    <h1>Log in to continue</h1>
    <p class="subtitle">Sign in to run Workflow prompts, save presets, and sync projects.</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email or username</label>
        <input id="email" type="text" placeholder="you@example.com or username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••">
      </div>
      <div class="actions">
        <label class="remember">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a href="#" class="small">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary">Log in</button>
    </form>
    <p class="hint">No account yet? <a href="#">Create one</a></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var prompt = params.get('prompt') || '';

      var form = document.getElementById('login-form');
      if (!form) return;

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var url = 'workflow.html';
        if (prompt) {
          url += '?prompt=' + encodeURIComponent(prompt);
        }
        window.location.href = url;
      });
    })();
  </script>
</body>
</html>
